# zensur example config. Copy to config.yaml (or set ZENSUR_CONFIG=/path/to.yaml)
# and customize. Patterns shown here are placeholders.

# Global default normalization options. Each rule inherits these and can
# override any field individually. Built-in fallbacks (when both global and
# rule leave a field unset) are: case_insensitive=true, normalize_unicode=true,
# strip_marks=true, leet=false, collapse_repeats=false, fold_kana=false.
defaults:
  case_insensitive: true
  normalize_unicode: true   # NFKC (ｂａｄｗｏｒｄ → badword)
  strip_marks: true         # defeats zalgo and combining-mark evasion
  leet: false               # 0→o, 1→i, 3→e, 4→a, 5→s, 7→t, @→a, $→s, !→i
  collapse_repeats: false   # "fuuuck" → "fuck" (only collapses runs of 3+)
  fold_kana: false          # hiragana ↔ katakana

# Used by the "warn" action and as the fallback when a rule's own notice is
# empty. Set notice_auto_delete_seconds to 0 to leave the notice in place.
notice: "Your message was removed."
notice_auto_delete_seconds: 8

# Used by the "replace" action when a rule's own replacement is empty.
replacement: "***"

# Rules are evaluated in order. Each rule has:
#   id          — unique identifier (used in logs and to look up notices)
#   patterns    — list of patterns; semantics depend on `mode`
#   mode        — substring | word | regex
#                   substring: matches anywhere (best for CJK / no whitespace)
#                   word:      matches only at letter/digit boundaries
#                              (best for English-like languages)
#                   regex:     RE2; matched against the normalized text
#   action      — log | delete | warn | replace
#                   replace requires the bot to have Manage Webhooks
#                   permission in the channel; falls back to a notice on error
#   notice      — per-rule override of the global notice (warn / replace
#                 fallback)
#   replacement — per-rule override of the global replacement (replace action)
#   allow       — phrases that suppress this rule when present in the
#                 normalized message (Scunthorpe-problem workaround)
# Plus any normalize option from `defaults` to override per-rule.
rules:
  - id: example-en
    patterns: ["dummyword"]
    mode: word
    action: delete

  - id: example-jp
    patterns: ["ダミー語"]
    mode: substring
    action: warn
    fold_kana: true        # match ダミー語 / だみー語

  - id: example-regex
    patterns: ['(?i)https?://(suspicious|phish)\.example\.com\S*']
    mode: regex
    action: replace
    replacement: "[link removed]"

  - id: example-allow
    patterns: ["cunt"]
    mode: substring
    action: delete
    allow: ["scunthorpe"]   # exempts the message when "scunthorpe" is present

# Optional semantic filter. Each message is also judged by a large language
# model against the natural-language `directive` below. A message is acted on
# if EITHER the pattern rules above OR the model flag it; when both fire, the
# more disruptive action wins (log < warn < delete).
#
# Each provider is its official Go SDK wrapped behind one small in-house adapter,
# so switching vendors is just a provider/model change here — no code changes.
llm:
  enabled: false                 # set true to turn the filter on
  provider: openai               # openai | anthropic | google
                                 #   "openai" also drives any OpenAI-compatible
                                 #   endpoint (xAI, Groq, OpenRouter, vLLM,
                                 #   ollama's /v1, …) when `endpoint` is set.
  model: gpt-4o-mini             # provider-specific model id (must support vision if images.enabled)
  api_key_env: OPENAI_API_KEY    # env var holding the API key (kept out of this file)
  # endpoint: ""                 # optional base URL override (self-hosted gateway, Gemini base, …)

  action: warn                   # log | delete | warn  (replace is not available for the LLM filter)
  notice: "Your message was removed by the moderation assistant."

  # Tuning (all optional):
  # timeout_seconds: 15          # per-call timeout
  # max_tokens: 200              # cap on the model's reply length
  # temperature: 0               # 0 = deterministic
  # max_message_chars: 4000      # truncate long messages before sending, to bound token use

  # The moderation policy, in plain language. Be specific about what to flag
  # and what to leave alone — the model applies only what you write here.
  directive: |
    Flag a message only if it clearly does one of the following:
      - targets a person or group with hateful slurs or harassment
      - shares sexually explicit content involving minors
      - solicits or facilitates real-world violence
      - posts scam, phishing, or malware links
    Do NOT flag ordinary profanity, heated debate, jokes, or off-topic chatter.
    When in doubt, do not flag.

  # Optional: also inspect IMAGE ATTACHMENTS with the provider's vision model.
  # Reuses the provider/endpoint/API key above. Each image is one extra model
  # call, so mind cost and latency on busy channels.
  images:
    enabled: false               # set true to turn image filtering on
    # model: gpt-4o              # optional vision-capable model override (defaults to the model above)
    # action: delete             # optional override (defaults to the action above)
    # max_bytes: 5242880         # skip image attachments larger than this (default 5 MiB)
    # max_count: 4               # max image attachments checked per message (default 4)
    # directive: |               # optional image-specific policy (defaults to the text directive above)
    #   Flag the image if it depicts explicit sexual content, gore, or hateful
    #   symbols. Do not flag ordinary photos, memes, or screenshots.
